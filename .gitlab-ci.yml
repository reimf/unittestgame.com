default:
  image: node:latest

stages:
  - compile
  - test
  - deploy

typescript:
  stage: compile
  script:
    - npm ci
    - npx tsc --build --force --verbose
  artifacts:
    paths:
      - "src/**/*.js"
      - "src/**/*.js.map"
      - "test/**/*.js"
      - "test/**/*.js.map"
  only:
    - main

playwright:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  variables:
    NO_COLOR: "1"
  script:
    - npm ci
    - npx playwright test --quiet
  coverage: '/Branches\s*:\s*[\d.]+\%/'
  artifacts:
    paths:
      - playwright-report/
      - playwright-coverage/
  only:
    - main

pages:
  stage: deploy
  script:
    - mkdir public
    - cp *.{css,html,ico,png,txt} public
    - mkdir public/src
    - cp src/*.{js,js.map} public/src
    - gzip -k -6 public/*.{css,html} public/src/*.js
  artifacts:
    paths:
      - public
  only:
    - main
