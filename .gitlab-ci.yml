default:
  image: node:latest

stages:
  - compile
  - test
  - deploy

typescript:
  stage: compile
  script:
    - npm ci
    - npx tsc --build --force --verbose
  artifacts:
    paths:
      - "src/**/*.js"
      - "test/**/*.js"
  only:
    - main

playwright:
  stage: test
  image: mcr.microsoft.com/playwright:v1.60.0-noble
  script:
    - npm ci
    - npx playwright test --quiet
  artifacts:
    paths:
      - playwright-report/
  only:
    - main

pages:
  stage: deploy
  script:
    - mkdir public
    - cp *.{css,html,ico,png} public
    - mkdir public/src
    - cp src/*.js public/src
    - gzip -k -6 public/*.{css,html} public/src/*.js
  artifacts:
    paths:
      - public
  only:
    - main
